    <div class="contacts">
        <h2 class="header">Contact Us</h2>

<div class="contact-content">
        <!-- CONTACT FORM -->
        <div class="contact-form">
        <form>
            <input type="text" placeholder="Name" pattern="[A-Za-z\s]{1,32}" required>

            <input type="email" placeholder="Email" 
                pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$" required>

            <input type="tel" name="phone" pattern="[0-9]{10,11}" maxlength="11"
                placeholder="Mobile Number (09xxxxxxxxx)" required>

            <div class="dropdown">
                <select name="project" id="projectSelect" required>
                    <option value="" disabled selected>Select a Project</option>
                    <option value="dining-table">Table</option>
                    <option value="coffee-table">Shelves</option>
                    <option value="bed-frame">TV Stand</option>
                    <option value="cabinet">Cabinet</option>
                    <option value="tv-stand">Bed Frame</option>
                    <option value="other">Other</option>
                </select>

                <textarea id="otherMessage"
                    placeholder="Please describe your project..."
                    style="display:none; margin-top:10px; width:100%; border-radius:5px;">
                </textarea>
            </div>

            <button type="submit">Send</button>
        </form>
    </div>
