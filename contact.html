<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="header_style.css">
    <link rel="stylesheet" href="contact_style.css">
    <link rel="stylesheet" href="footer_style.css">
    <script src="https://kit.fontawesome.com/eb58d2605a.js" crossorigin="anonymous"></script>
    <link rel="icon" type="image" href="images/logo-no-text.png">
    <script src="contact_form.js" defer></script>

</head>
<body class="contact-page">

    <header class="main-navbar">
        <div class="container-nav">
            <div class="navdiv">
                <div class="logo"><a href="./index.html">MYLON WOODWORKS</a></div>
                    <ul>
                        <li><a href="./index.html">HOME</a></li>
                        <li><a href="./about.html">ABOUT</a></li>
                        <li><a href="./features.html">GALLERY</a></li>
                        <li><a href="./contact.html">CONTACT</a></li>
                    </ul>
            </div>
        </div>
    </header>
    


    <div class="contacts">
        <h2 class="header">Contact Us</h2>

<div class="contact-content">

    <!-- TOP SECTION -->
    <div class="top-contact-section">

        <!-- SOCIAL INFO -->
        <div class="text-section">

            <div class="logo-text">
                <a href="https://www.facebook.com/MylonWoodworks" target="_blank">
                    <i class="fa-brands fa-facebook"></i>
                    <span>facebook.com/MylonWoodworks</span>
                </a>
            </div>

            <div class="logo-text">
                <a href="https://www.tiktok.com/@mylon.woodworks" target="_blank">
                    <i class="fa-brands fa-tiktok"></i>
                    <span>@mylon.woodworks</span>
                </a>
            </div>

            <div class="logo-text">
                <a href="https://www.instagram.com/mylonwoodworks" target="_blank">
                    <i class="fa-brands fa-instagram"></i>
                    <span>@mylonwoodworks</span>
                </a>
            </div>

            <div class="logo-text">
                <a href="mailto:mylonwoodworks@gmail.com" target="_blank">
                    <i class="fa-solid fa-envelope"></i>
                    <span>mylonwoodworks@gmail.com</span>
                </a>
            </div>

            <div class="logo-text">
                <a href="tel:+639664004402" target="_blank">
                    <i class="fa-solid fa-phone"></i>
                    <span>0966 400 4402</span>
                </a>
            </div>

        </div>

        <!-- QR CODES -->
        <div class="contacts-qr">
            <img src="https://file.garden/aYC8ZhqIC3TWlhBw/tiktok-qr.png" alt="TikTok QR">
            <img src="https://file.garden/aYC8ZhqIC3TWlhBw/instagram-qr.png" alt="Instagram QR">
        </div>

    </div>

    <!-- FORM SECTION -->
    <div class="contact-form-wrapper">

        <h3 class="header">Send Us a Message</h3>

        <div class="contact-form">
            <form>

                

                <input type="text" id="nameInput" placeholder="Name" required>

                <input type="email" placeholder="Email"
                    pattern="^[a-zA-Z0-9._%+-]+@(gmail\.com|yahoo\.com|outlook\.com)$" required>

                <input type="tel" id="phoneInput" maxlength="11"
                    placeholder="Mobile Number (09xxxxxxxxx)" required>


            <!-- CHECKBOXES -->
                <div class="project-checkboxes">

                    <p class="project-title">Select Project/s</p>

                    <label><input type="checkbox"> Food Kiosk & Food Carts</label>
                    <label><input type="checkbox"> Wardrobe Cabinets</label>
                    <label><input type="checkbox"> Bed Frames</label>
                    <label><input type="checkbox"> Media Consoles</label>
                    <label><input type="checkbox"> Loft Beds</label>
                    <label><input type="checkbox"> Kitchen Renovation</label>
                    <label><input type="checkbox"> Under-Stairs Storage</label>
                    <label><input type="checkbox"> Tile & Stone Works</label>
                    <label><input type="checkbox"> Metal Work</label>
                    <label><input type="checkbox"> Roofing</label>
                    <label>
                    <input type="checkbox" id="otherServices">
                    Other Services
                    </label>

                        <input 
                            type="text" 
                            id="otherText" 
                            placeholder="Please specify other service"
                            style="display: none; margin-top: 10px;"
                        >

                </div>

                <button type="submit">Send</button>

            </form>
        </div>

    </div>

</div>

<!-- APPOINTMENT SECTION -->
<div class="appointment-section">

    <p class="project-title">Book an Appointment</p>

    <label for="appointmentDate">Select Date</label>
    <input type="date" id="appointmentDate" required>

    <label for="appointmentTime">Select Time</label>
    <input type="time" id="appointmentTime" required>

    <textarea 
        id="appointmentNotes"
        rows="4"
        placeholder="Additional notes or preferred meeting details">
    </textarea>

</div>

        
    

        
</body>
</html>
